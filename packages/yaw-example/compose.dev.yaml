services:
  app:
    build:
      context: ../..
      dockerfile: packages/yaw-example/Dockerfile
      args:
        NGINX_CONF: nginx.dev.conf
    ports:
      - "3010:80"
  ssl-proxy:
    image: nginx:alpine
    ports:
      - "3443:443"
    volumes:
      - ./ssl:/etc/nginx/ssl:ro
      - ./nginx.dev.ssl.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
