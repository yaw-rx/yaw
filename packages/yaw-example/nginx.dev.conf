# SSG fallback for client-side routing -- development (no caching).
#
# Each SSG route has its own index.html (e.g. /docs/index.html, /showcase/index.html).
# Sub-paths like /docs/getting-started/tsconfig must serve /docs/index.html so the
# client-side router can handle the rest.
#
# The @fallback location strips the last path segment and restarts matching.
# This recurses until an index.html is found at the nearest ancestor route:
#
#   /docs/getting-started/tsconfig
#     -> try /docs/getting-started/tsconfig (miss)
#     -> try /docs/getting-started/tsconfig/index.html (miss)
#     -> @fallback strips to /docs/getting-started
#     -> try /docs/getting-started/index.html (miss)
#     -> @fallback strips to /docs
#     -> try /docs/index.html (hit -- serve it)
#
# Works for arbitrary nesting depth (nginx caps at 10 internal redirects).

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    add_header Cache-Control "no-store";

    location /assets/ {
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/index.html @fallback;
    }

    location @fallback {
        rewrite ^(/.*)/[^/]+$ $1 last;
        return 404;
    }
}
